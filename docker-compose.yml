version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: ai-learning-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-learning-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-learning-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: ai-learning-telegram
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  openclaw-agent:
    build: .
    container_name: openclaw-agent
    ports:
      - "3080:3000"
    env_file:
      - .env
    depends_on:
      - ollama
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    container_name: searxng
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mongo_data:
